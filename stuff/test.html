<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fetch Local JSON</title>
</head>
<body>
    <h1>Check your browser console (F12) to see the data!</h1>

    <script>
        async function loadLocalJSON() {
            try {
                // Fetch the file using a relative path
                const response = await fetch('./level2_mid.json');
                
                // Always check if the HTTP response is OK
                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }
                
                // Parse the response stream into a JavaScript object
                const data = await response.json();
                console.log("Success! Here is your data:", data);
                
            } catch (error) {
                console.error("Failed to read JSON file:", error);
            }
        }

        // Run the function
        loadLocalJSON();
    </script>
</body>
</html>
